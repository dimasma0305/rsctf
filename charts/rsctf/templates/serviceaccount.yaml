{{- $localBackend := include "rsctf.localContainerBackend" . | trim }}
{{- if and (ne .Values.runtimeRole "migrate") .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "rsctf.serviceAccountName" . }}
  labels:
    {{- include "rsctf.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ eq $localBackend "kubernetes" }}
{{- end }}
