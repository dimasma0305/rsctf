<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">The Attack and Defense round loop and separate settlement process</title>
  <desc id="desc">Four live-play steps repeat every round. The round opens and fresh flag records are issued, custom checkers receive the recorded flag and report service outcomes, teams attack opponents and patch their own services, then accepted flag submissions are attributed to the epoch in which each flag was issued and the Live score updates. Bring Your Own Container (BYOC) flag delivery uses the relay; running managed containers do not receive automatic per-round flag injection. Settlement is a separate process: normal settlement waits for required checks and final flag windows, while game close starts checker closeout and grace-threshold fallback.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#132735" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-navy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#08756f"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#f6f1e7"/>

  <text x="100" y="76" fill="#132735" font-family="Georgia, serif" font-size="48" font-weight="700">One round is a live operating loop</text>
  <text x="100" y="116" fill="#5f6368" font-family="Lexend, system-ui, sans-serif" font-size="22">Every tick opens a new round. Attack, defense, checking, and evidence collection happen together.</text>

  <rect x="100" y="146" width="190" height="38" rx="19" fill="#172b38"/>
  <text x="195" y="171" text-anchor="middle" fill="#ffffff" font-family="Lexend, system-ui, sans-serif" font-size="16" font-weight="800">LIVE ROUND LOOP</text>
  <text x="315" y="171" fill="#53606a" font-family="Lexend, system-ui, sans-serif" font-size="16">Repeats while the game is running</text>

  <g filter="url(#shadow)">
    <rect x="80" y="215" width="330" height="345" rx="24" fill="#dce8f5" stroke="#2f67a8" stroke-width="3"/>
    <rect x="450" y="215" width="330" height="345" rx="24" fill="#d7ece8" stroke="#08756f" stroke-width="3"/>
    <rect x="820" y="215" width="330" height="345" rx="24" fill="#f3e3b8" stroke="#996600" stroke-width="3"/>
    <rect x="1190" y="215" width="330" height="345" rx="24" fill="#f2cfc5" stroke="#b9362c" stroke-width="3"/>
  </g>

  <g font-family="Lexend, system-ui, sans-serif" font-weight="800" text-anchor="middle">
    <circle cx="120" cy="256" r="23" fill="#2f67a8"/>
    <text x="120" y="264" fill="#ffffff" font-size="21">1</text>
    <circle cx="490" cy="256" r="23" fill="#08756f"/>
    <text x="490" y="264" fill="#ffffff" font-size="21">2</text>
    <circle cx="860" cy="256" r="23" fill="#996600"/>
    <text x="860" y="264" fill="#ffffff" font-size="21">3</text>
    <circle cx="1230" cy="256" r="23" fill="#b9362c"/>
    <text x="1230" y="264" fill="#ffffff" font-size="21">4</text>
  </g>

  <g font-family="Lexend, system-ui, sans-serif">
    <text x="115" y="314" fill="#244f83" font-size="25" font-weight="800">ROUND OPENS</text>
    <text x="115" y="359" fill="#293f57" font-size="18">The previous round closes.</text>
    <text x="115" y="393" fill="#293f57" font-size="18">Fresh, per-team flag records</text>
    <text x="115" y="420" fill="#293f57" font-size="18">are issued for this round.</text>
    <rect x="115" y="464" width="260" height="54" rx="14" fill="#edf4fa" stroke="#2f67a8" stroke-width="2"/>
    <text x="245" y="487" text-anchor="middle" fill="#244f83" font-size="15" font-weight="700">NEW ROUND STATE</text>
    <text x="245" y="507" text-anchor="middle" fill="#3a5875" font-size="14">flag identity + issue time</text>

    <text x="485" y="314" fill="#075e59" font-size="25" font-weight="800">CHECK</text>
    <text x="485" y="359" fill="#27484a" font-size="18">The checker reports:</text>
    <circle cx="495" cy="391" r="5" fill="#08756f"/>
    <text x="512" y="397" fill="#27484a" font-size="17">availability</text>
    <circle cx="495" cy="428" r="5" fill="#08756f"/>
    <text x="512" y="434" fill="#27484a" font-size="17">protocol correctness</text>
    <circle cx="495" cy="465" r="5" fill="#08756f"/>
    <text x="512" y="471" fill="#27484a" font-size="17">flag handling (trusted)</text>
    <rect x="485" y="493" width="260" height="36" rx="13" fill="#eaf6f3" stroke="#08756f" stroke-width="2"/>
    <text x="615" y="517" text-anchor="middle" fill="#075e59" font-size="14" font-weight="700">SLA EVIDENCE RECORDED</text>

    <text x="855" y="314" fill="#7d5400" font-size="25" font-weight="800">ATTACK + PATCH</text>
    <text x="855" y="359" fill="#584519" font-size="18">Teams work both sides:</text>
    <text x="855" y="399" fill="#584519" font-size="17" font-weight="700">ATTACK</text>
    <text x="932" y="399" fill="#584519" font-size="17">run exploits, collect flags</text>
    <text x="855" y="441" fill="#584519" font-size="17" font-weight="700">DEFEND</text>
    <text x="938" y="441" fill="#584519" font-size="17">patch; preserve SLA</text>
    <rect x="855" y="475" width="260" height="54" rx="14" fill="#fbf3da" stroke="#996600" stroke-width="2"/>
    <text x="985" y="498" text-anchor="middle" fill="#7d5400" font-size="15" font-weight="700">CONTINUOUS OPERATIONS</text>
    <text x="985" y="518" text-anchor="middle" fill="#6d5929" font-size="14">watch, test, adapt, repeat</text>

    <text x="1225" y="314" fill="#8f281f" font-size="25" font-weight="800">SUBMIT + RECORD</text>
    <text x="1225" y="359" fill="#6f332d" font-size="18">Accepted flag evidence is tied</text>
    <text x="1225" y="386" fill="#6f332d" font-size="18">to the epoch in which that flag</text>
    <text x="1225" y="413" fill="#6f332d" font-size="18">was issued, not submitted.</text>
    <rect x="1225" y="452" width="260" height="66" rx="15" fill="#fff0eb" stroke="#b9362c" stroke-width="2"/>
    <text x="1355" y="478" text-anchor="middle" fill="#8f281f" font-size="16" font-weight="800">LIVE SCORE UPDATES</text>
    <text x="1355" y="500" text-anchor="middle" fill="#79413b" font-size="14">provisional until settlement</text>
  </g>

  <g fill="none" stroke="#334155" stroke-width="4" marker-end="url(#arrow-navy)">
    <line x1="414" y1="386" x2="444" y2="386"/>
    <line x1="784" y1="386" x2="814" y2="386"/>
    <line x1="1154" y1="386" x2="1184" y2="386"/>
  </g>

  <path d="M 1355 574 C 1355 638, 245 638, 245 574" fill="none" stroke="#08756f" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrow-teal)"/>
  <rect x="680" y="590" width="240" height="36" rx="18" fill="#d7ece8"/>
  <text x="800" y="614" text-anchor="middle" fill="#075e59" font-family="Lexend, system-ui, sans-serif" font-size="15" font-weight="800">NEXT TICK / ROUND</text>

  <line x1="100" y1="663" x2="1500" y2="663" stroke="#9aa3a8" stroke-width="2" stroke-dasharray="8 9"/>
  <rect x="100" y="687" width="286" height="38" rx="19" fill="#172b38"/>
  <text x="243" y="712" text-anchor="middle" fill="#ffffff" font-family="Lexend, system-ui, sans-serif" font-size="16" font-weight="800">SEPARATE SETTLEMENT LANE</text>
  <text x="410" y="712" fill="#53606a" font-family="Lexend, system-ui, sans-serif" font-size="16">Not a fifth step inside every round</text>

  <rect x="100" y="748" width="1400" height="108" rx="22" fill="#172b38" filter="url(#shadow)"/>
  <text x="140" y="786" fill="#ffffff" font-family="Lexend, system-ui, sans-serif" font-size="20" font-weight="800">NORMAL SETTLEMENT</text>
  <text x="140" y="819" fill="#dbe5ea" font-family="Lexend, system-ui, sans-serif" font-size="17">Waits for required checks + the epoch's final flag windows to close.</text>
  <line x1="745" y1="770" x2="745" y2="834" stroke="#526773" stroke-width="2"/>
  <text x="790" y="786" fill="#f3d786" font-family="Lexend, system-ui, sans-serif" font-size="20" font-weight="800">GAME CLOSE</text>
  <text x="790" y="819" fill="#dbe5ea" font-family="Lexend, system-ui, sans-serif" font-size="17">Starts checker closeout so the final ranking can become Settled.</text>
</svg>
