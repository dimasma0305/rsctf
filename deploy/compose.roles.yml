# Optional same-binary split topology: scale the base `rsctf` service as the
# public web tier and run one control owner. This file deliberately does not
# grant Docker/TUN privileges; add compose.roles.docker.yml or
# compose.roles.ad-vpn.yml when those capabilities are required.
#
# Before first start/upgrade, run the one-shot migration command documented in
# docs/deploy/scaling.md. Then:
#   docker compose up -d --scale rsctf=3
services:
  rsctf:
    # Split roles must all resolve the same reviewed image. Requiring the
    # variable here keeps every replica on one immutable build.
    image: ${RSCTF_IMAGE:?Set RSCTF_IMAGE to one immutable rsctf image digest}
    # The base file publishes one fixed host port, which cannot be scaled.
    # `!reset` requires Docker Compose v2.24+ and leaves discovery/LB to Caddy
    # or another reverse proxy on the Compose network.
    ports: !reset []
    # Public web replicas never execute checkers.
    cap_add: !reset []
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rsctf-control:
        condition: service_healthy
    environment:
      RSCTF_ROLE: web
      RSCTF_MIGRATE: "0"
      RSCTF_SHARED_STORAGE: "true"
      RSCTF_DISTRIBUTED_RATELIMIT: "true"
      RSCTF_DB_MAX_CONNECTIONS: ${RSCTF_WEB_DB_MAX_CONNECTIONS:-26}
    networks:
      default:
        # The base service owns this alias in single-role mode. Remove it from
        # every web replica so stateful traffic has exactly one destination.
        aliases: !reset []
      backend: {}

  rsctf-control:
    image: ${RSCTF_IMAGE:?Set RSCTF_IMAGE to one immutable rsctf image digest}
    restart: unless-stopped
    init: true
    pids_limit: ${RSCTF_APP_PIDS_LIMIT:-1024}
    # Control owns the checker and network engines in this topology. Packet
    # capture is a separate opt-in via compose.roles.capture.yml.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - KILL
      - SETGID
      - SETUID
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=256m,mode=1777
      - /run:rw,nosuid,nodev,size=16m
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RSCTF_ROLE: control
      RSCTF_BIND: 0.0.0.0:8080
      RSCTF_DATABASE_URL: postgresql://${POSTGRES_USER:-rsctf}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/.env}@db:5432/${POSTGRES_DB:-rsctf}
      RSCTF_REDIS_URL: redis://redis:6379
      RSCTF_DISTRIBUTED_RATELIMIT: "true"
      RSCTF_AD_FLAG_PUSH_CONCURRENCY: ${RSCTF_AD_FLAG_PUSH_CONCURRENCY:-64}
      RSCTF_AD_FLAG_PUSH_ATTEMPTS: ${RSCTF_AD_FLAG_PUSH_ATTEMPTS:-3}
      RSCTF_AD_FLAG_PUSH_TIMEOUT_SECONDS: ${RSCTF_AD_FLAG_PUSH_TIMEOUT_SECONDS:-2}
      RSCTF_JWT_SECRET: ${RSCTF_JWT_SECRET:?Set RSCTF_JWT_SECRET in deploy/.env}
      RSCTF_BOOTSTRAP_TOKEN: ${RSCTF_BOOTSTRAP_TOKEN:?Set RSCTF_BOOTSTRAP_TOKEN in deploy/.env to a random 32-byte value}
      RSCTF_JWT_TTL_SECS: ${RSCTF_JWT_TTL_SECS:-604800}
      RSCTF_PUBLIC_URL: ${RSCTF_PUBLIC_URL:?Set RSCTF_PUBLIC_URL in deploy/.env}
      RSCTF_COOKIE_SECURE: ${RSCTF_COOKIE_SECURE:-true}
      RSCTF_TRUSTED_PROXY_CIDRS: ${RSCTF_TRUSTED_PROXY_CIDRS:-}
      RSCTF_STORAGE_ROOT: /data/files
      RSCTF_CHECKER_UID_BASE: ${RSCTF_CHECKER_UID_BASE:-60000}
      RSCTF_CHECKER_PROCESS_BUDGET: ${RSCTF_CHECKER_PROCESS_BUDGET:-32}
      RSCTF_SHARED_STORAGE: "true"
      RSCTF_STORAGE_BACKEND: ${RSCTF_STORAGE_BACKEND:-local}
      RSCTF_S3_BUCKET: ${RSCTF_S3_BUCKET:-}
      RSCTF_S3_REGION: ${RSCTF_S3_REGION:-}
      RSCTF_S3_ENDPOINT: ${RSCTF_S3_ENDPOINT:-}
      RSCTF_S3_PREFIX: ${RSCTF_S3_PREFIX:-assets}
      RSCTF_S3_ACCESS_KEY: ${RSCTF_S3_ACCESS_KEY:-}
      RSCTF_S3_SECRET_KEY: ${RSCTF_S3_SECRET_KEY:-}
      RSCTF_MIGRATE: "0"
      RSCTF_DB_MAX_CONNECTIONS: ${RSCTF_CONTROL_DB_MAX_CONNECTIONS:-20}
      RSCTF_PROVISIONING_CONCURRENCY: ${RSCTF_PROVISIONING_CONCURRENCY:-4}
      RSCTF_REPO_SCAN_CONCURRENCY: ${RSCTF_REPO_SCAN_CONCURRENCY:-1}
      RSCTF_CONTAINER_BACKEND: ${RSCTF_CONTAINER_BACKEND:-none}
      RSCTF_DOCKER_SCOPE: ${RSCTF_DOCKER_SCOPE:-}
      RSCTF_CONTAINER_MAX_MEMORY_MB: ${RSCTF_CONTAINER_MAX_MEMORY_MB:-4096}
      RSCTF_CONTAINER_MAX_CPU_COUNT: ${RSCTF_CONTAINER_MAX_CPU_COUNT:-8}
      RSCTF_TRAFFIC_CAPTURE_ENABLED: ${RSCTF_TRAFFIC_CAPTURE_ENABLED:-false}
      RSCTF_CAPTURE_DEVICE: ${RSCTF_CAPTURE_DEVICE:-any}
      RSCTF_CAPTURE_RECONCILE_SECONDS: ${RSCTF_CAPTURE_RECONCILE_SECONDS:-2}
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - files_data:/data/files
    networks:
      default:
        aliases:
          - rsctf-network
      backend: {}
    expose:
      - "8080"
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3).read()"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    stop_grace_period: 5m
