name: Continuous integration

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rsctf_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d rsctf_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      RSCTF_TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/rsctf_test
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install --yes --no-install-recommends libpcap-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check all targets
        run: cargo check --all-targets --all-features --locked

      - name: Build
        run: cargo build --locked

      - name: Run tests
        run: cargo test --all-targets --all-features --locked

      - name: Regress legacy infinite-lockout team roster
        run: >-
          cargo test --locked roster_projection_tolerates_legacy_infinite_lockouts
          -- --ignored --nocapture

      - name: Regress repository solve preservation
        run: >-
          cargo test --locked repository_update_preserves_challenge_solves_and_refreshes_content
          -- --ignored --nocapture

  byoc-agent:
    name: BYOC agent
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: agents/byoc-agent
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: clippy, rustfmt

      - name: Restore BYOC agent build cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: agents/byoc-agent -> target
          shared-key: byoc-agent

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check all targets
        run: cargo check --all-targets --locked

      - name: Run Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Run tests
        run: cargo test --all-targets --locked

  worker-plane-linux:
    name: Worker plane (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: clippy, rustfmt
          targets: x86_64-unknown-linux-musl

      - name: Install musl linker
        run: sudo apt-get update && sudo apt-get install --yes musl-tools

      - name: Restore worker build cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: |
            lib/worker-protocol -> target
            agents/worker-agent -> target
          shared-key: worker-plane-linux

      - name: Check protocol formatting
        run: cargo fmt --manifest-path lib/worker-protocol/Cargo.toml --all -- --check

      - name: Check agent formatting
        run: cargo fmt --manifest-path agents/worker-agent/Cargo.toml --all -- --check

      - name: Check protocol
        run: cargo check --manifest-path lib/worker-protocol/Cargo.toml --all-targets --locked

      - name: Check agent
        run: cargo check --manifest-path agents/worker-agent/Cargo.toml --all-targets --locked

      - name: Build release worker artifact
        run: >-
          cargo build --manifest-path agents/worker-agent/Cargo.toml
          --release --target x86_64-unknown-linux-musl --locked

      - name: Run Clippy
        run: cargo clippy --manifest-path agents/worker-agent/Cargo.toml --all-targets --locked -- -D warnings

      - name: Test protocol
        run: cargo test --manifest-path lib/worker-protocol/Cargo.toml --all-targets --locked

      - name: Test agent
        run: cargo test --manifest-path agents/worker-agent/Cargo.toml --all-targets --locked

      - name: Test Docker worker lifecycle
        shell: bash
        run: |
          docker build --tag rsctf-worker-smoke:ci \
            examples/challenge-repository/Jeopardy/Web/static-flag-service/src
          image_id="$(docker image inspect rsctf-worker-smoke:ci --format '{{.Id}}')"
          RSCTF_WORKER_TEST_IMAGE_ID="$image_id" \
            cargo test --manifest-path agents/worker-agent/Cargo.toml --locked \
            docker_workload_lifecycle_when_image_is_configured -- --nocapture

  worker-plane-windows:
    name: Worker compatibility (Windows)
    runs-on: windows-latest
    timeout-minutes: 25
    env:
      RUSTFLAGS: -Dwarnings -C target-feature=+crt-static
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: clippy, rustfmt
          targets: x86_64-pc-windows-msvc

      - name: Restore Windows worker build cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: |
            lib/worker-protocol -> target
            agents/worker-agent -> target
          shared-key: worker-plane-windows

      - name: Check protocol formatting
        run: cargo fmt --manifest-path lib/worker-protocol/Cargo.toml --all -- --check

      - name: Check agent formatting
        run: cargo fmt --manifest-path agents/worker-agent/Cargo.toml --all -- --check

      - name: Check Windows target
        run: cargo check --manifest-path agents/worker-agent/Cargo.toml --all-targets --target x86_64-pc-windows-msvc --locked

      - name: Run Windows Clippy
        run: cargo clippy --manifest-path agents/worker-agent/Cargo.toml --all-targets --target x86_64-pc-windows-msvc --locked -- -D warnings

      - name: Test protocol on Windows
        run: cargo test --manifest-path lib/worker-protocol/Cargo.toml --all-targets --target x86_64-pc-windows-msvc --locked

      - name: Test agent on Windows
        run: cargo test --manifest-path agents/worker-agent/Cargo.toml --all-targets --target x86_64-pc-windows-msvc --locked

      - name: Build release worker executable
        run: cargo build --manifest-path agents/worker-agent/Cargo.toml --release --target x86_64-pc-windows-msvc --locked

      - name: Validate Windows installer scripts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($script in @('scripts/bootstrap-worker.ps1', 'scripts/install-worker.ps1')) {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($script, [ref]$tokens, [ref]$errors)
            if ($errors.Count -ne 0) {
              $errors | ForEach-Object { Write-Error $_ }
              throw "$script contains PowerShell syntax errors"
            }
          }
          $bootstrap = Get-Content -LiteralPath 'scripts/bootstrap-worker.ps1' -Raw
          if ($bootstrap -notmatch "Read-Host 'One-time enrollment token' -AsSecureString") { throw 'Windows token prompt is not hidden' }
          if ($bootstrap -notmatch "Read-Host 'Type DEDICATED to continue'") { throw 'Windows bootstrap does not require the host-boundary acknowledgement' }
          if ($bootstrap -notmatch '--token-stdin') { throw 'Windows enrollment does not use stdin' }
          if ($bootstrap -match '--token\s+\$plainToken|\?token=') { throw 'Windows bootstrap exposes the enrollment token' }
          $installer = Get-Content -LiteralPath 'scripts/install-worker.ps1' -Raw
          if ($installer -notmatch 'New-ScheduledTaskTrigger -AtStartup') { throw 'Windows worker is not configured to start after reboot' }
          if (-not $installer.Contains('$dockerDriver -ne ''windowsfilter''')) { throw 'Windows installer does not require enforceable storage quotas' }
          if (-not $installer.Contains('$acl.SetAccessRuleProtection($true, $false)')) { throw 'Windows installer does not remove inherited ACLs' }
          if ($installer -notmatch 'Protect-WorkerDirectory -Path \$stateDirectory -OwnerSid ''S-1-5-18''') { throw 'Windows state is not assigned to SYSTEM' }
          if ($installer -match 'icacls\.exe') { throw 'Windows installer uses locale-sensitive ACL tooling' }

      - name: Smoke-test worker executable
        shell: pwsh
        run: |
          $binary = "agents/worker-agent/target/x86_64-pc-windows-msvc/release/rsctf-worker-agent.exe"
          $version = & $binary --version
          if ($LASTEXITCODE -ne 0) {
            throw "worker executable --version failed with exit code $LASTEXITCODE"
          }
          if ($version -notmatch '^rsctf-worker-agent ') {
            throw "worker executable returned an unexpected version string: $version"
          }

  helm-chart:
    name: Helm chart
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          version: v3.16.4

      - name: Validate chart
        run: ./scripts/validate-helm-chart.sh

      - name: Validate Compose capability ownership
        run: ./scripts/validate-compose-security.sh

  web:
    name: React client
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.8.0
          package_json_file: web/package.json

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm --dir web test

      - name: Build frontend
        run: pnpm --dir web build

  load-harness-contracts:
    name: Load harness contracts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: tests/load
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22

      - name: Verify route catalogs, safety guards, and harness contracts
        env:
          # Pure harness tests mint only local fixture JWTs. This is deliberately
          # not a deployment secret and cannot authenticate to any installation.
          RSCTF_JWT_SECRET: rsctf-load-harness-ci-only-secret
        run: npm test

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.8.0
          package_json_file: docs/package.json

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install documentation dependencies
        run: pnpm --dir docs install --frozen-lockfile

      - name: Generate journal PDFs
        run: pnpm --dir docs pdf

      - name: Build documentation
        run: pnpm --dir docs build

  repository-conventions:
    name: Repository conventions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Enforce Rust file size limit
        shell: bash
        run: |
          oversized="$(find src agents/byoc-agent/src agents/worker-agent/src lib/worker-protocol/src -name '*.rs' -type f -print0 | xargs -0 wc -l | awk '$2 != "total" && $1 > 1000')"
          if [[ -n "$oversized" ]]; then
            echo "::error::Rust source files must not exceed 1000 lines. Split each oversized file into a cohesive folder module."
            echo "$oversized"
            exit 1
          fi
          echo "All Rust source files are within the 1000-line limit."

      - name: Validate worker installer packaging
        shell: bash
        run: |
          bash -n scripts/bootstrap-worker.sh scripts/install-worker.sh
          scripts/bootstrap-worker.sh --help >/dev/null
          if scripts/bootstrap-worker.sh \
            --server-url 'https://user@example.com' >/dev/null 2>&1; then
            echo "::error::The worker bootstrap accepted credentials in its server URL."
            exit 1
          fi
          scripts/install-worker.sh --help >/dev/null
          if scripts/install-worker.sh --version latest >/dev/null 2>&1; then
            echo "::error::The worker installer accepted an invalid release version."
            exit 1
          fi
          test -x scripts/install-worker.sh
          test -x scripts/bootstrap-worker.sh
          test -f scripts/install-worker.ps1
          test -f scripts/bootstrap-worker.ps1
          test "$(stat -c '%a' scripts/bootstrap-worker.sh)" = "755"
          test "$(stat -c '%a' scripts/install-worker.sh)" = "755"
          test "$(stat -c '%a' agents/worker-agent/rsctf-worker-agent.service)" = "644"
          systemd-analyze security --offline=yes \
            agents/worker-agent/rsctf-worker-agent.service >/dev/null
          scripts/test-install-worker.sh

      - name: Validate deployment installer bootstrap
        shell: bash
        run: |
          bash -n scripts/install.sh scripts/test-install.sh scripts/test-install-shim.sh
          scripts/install.sh --help >/dev/null
          scripts/test-install.sh
